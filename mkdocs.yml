site_name: TheoChem Lab
site_description: Documentation for TheoChem Lab, a molecular visualization and modeling tool.
site_url: https://weikii.github.io/TheoChemLab/
repo_url: https://github.com/weikii/TheoChemLab
repo_name: weikii/TheoChemLab

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Quick Start:
      - start/index.md
      - Launch and Projects:
          - Welcome Screen: start/welcome.md
          - Getting Started: getting-started.md
      - Workspace Basics:
          - Main Workspace: start/main-workspace.md
          - Project View: start/project-view.md
  - Files and Projects:
      - File System Overview: files/index.md
      - Internal Document Types:
          - 3D Structure Viewer (.wsd): files/3d-structure-document.md
          - Text Document (.txd): files/text-document.md
          - Table Document (.tbd): files/table-document.md
          - Diagram Document (.dgd): files/diagram-document.md
      - Opening and Importing: files/open-and-import.md
      - Saving and Exporting: files/save-and-export.md
  - Interface:
      - Main Interface Overview: work-areas/main-interface.md
      - Project View: start/project-view.md
      - Object View: work-areas/object-view.md
      - Properties View: work-areas/properties-view.md
      - Output and Jobs Views: work-areas/output-and-jobs.md
      - Toolbar Reference: modules/toolbar-reference.md
  - Work Areas:
      - document-views/index.md
      - Document Viewers:
          - 3D Structure Viewer: document-views/3d-structure-viewer.md
          - Text, Table, and Diagram Views: document-views/text-table-diagram.md
      - Data Sources:
          - Data and Surface Files: document-views/data-and-surface-files.md
      - Reference:
          - User Interface Reference: user-interface.md
          - External API: reference/external-api.md
  - Menus and Toolbars:
      - modules/index.md
      - File / View / Edit:
          - File, View, and Edit Menus: modules/file-view-edit.md
          - Selection, Fragments, and Display: modules/selection-fragments-display.md
      - Display:
          - Display and Style Menus: modules/display-menu.md
      - Build:
          - Build and Edit Structures: modules/build-and-edit.md
          - Crystal Tools: modules/crystal-tools.md
      - Tools:
          - Surface and Volume Data: modules/surface-and-volume.md
          - Multiwfn and ESP Tools: modules/multiwfn-esp.md
          - Pair Manager: modules/pair-manager.md
          - Anisotropic Mobility: modules/anisotropic-mobility.md
          - PXRD and Tensor Visualization: modules/pxrd-and-tensors.md
      - Modules:
          - Gaussian Tools: modules/gaussian-tools.md
          - Gaussian Calculation: modules/gaussian-calculation.md
          - Gaussian Analysis: modules/gaussian-analysis.md
          - Electronic Coupling: modules/electronic-coupling.md
          - MD and Gromacs: modules/md-and-gromacs.md
          - MolPack: modules/molpack.md
          - CP2K Tools: modules/cp2k-tools.md
      - Help:
          - Updates: updates.md
  - Release and Access:
      - Installation: installation.md
      - Updates: updates.md
      - Terms: terms.md
      - About: about.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
