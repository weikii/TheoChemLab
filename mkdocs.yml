site_name: TheoChem Lab
site_description: Documentation for TheoChem Lab, a molecular visualization and modeling tool.
site_url: https://weikii.github.io/TheoChemLab/
repo_url: https://github.com/weikii/TheoChemLab
repo_name: weikii/TheoChemLab

theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - User Interface: user-interface.md
  - Modules:
      - Overview: modules/index.md
      - Crystal Tools: modules/crystal-tools.md
      - Gaussian Tools: modules/gaussian-tools.md
      - Electronic Coupling: modules/electronic-coupling.md
      - Anisotropic Mobility: modules/anisotropic-mobility.md
  - Updates: updates.md
  - Terms: terms.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
